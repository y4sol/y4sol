name: Update Tech Stack

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Language Stats
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          
          repos = ['openclaw-memory', 'fofa-skill', 'js-analyzer']
          all_langs = {}
          
          for repo in repos:
              url = f"https://api.github.com/repos/y4sol/{repo}/languages"
              try:
                  with urllib.request.urlopen(url) as resp:
                      data = json.loads(resp.read())
                      for lang, bytes in data.items():
                          all_langs[lang] = all_langs.get(lang, 0) + bytes
              except:
                  pass
          
          total = sum(all_langs.values())
          if total > 0:
              langs = []
              for lang, bytes in sorted(all_langs.items(), key=lambda x: -x[1])[:3]:
                  pct = int(bytes / total * 100)
                  langs.append(f"{lang}: {pct}%")
              print(" ".join(langs))
          else:
              print("Python: 100%")
          PYEOF
          > langs.txt

      - name: Update README
        run: |
          LANG=$(cat langs.txt)
          sed -i "s/placeholder_lang/$LANG/" README.md

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update tech stack"
