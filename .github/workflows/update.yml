name: Update Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Stats
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          u = json.loads(urllib.request.urlopen("https://api.github.com/users/y4sol").read())
          r = json.loads(urllib.request.urlopen("https://api.github.com/users/y4sol/repos?per_page=100").read())
          print(f"repos={u['public_repos']}")
          print(f"stars={sum(x.get('stargazers_count',0) for x in r)}")
          PYEOF
          > stats.txt

      - name: Get Languages
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          repos = ['openclaw-memory', 'fofa-skill', 'js-analyzer']
          L = {}
          for r in repos:
              try:
                  d = json.loads(urllib.request.urlopen(f"https://api.github.com/repos/y4sol/{r}/languages").read())
                  for k,v in d.items(): L[k] = L.get(k,0)+v
              except: pass
          t=sum(L.values())
          if t:
              print(" ".join(f"{k}:{int(v/t*100)}%" for k,v in sorted(L.items(),key=lambda x:-x[1])[:3]))
          else: print("Python: 100%")
          PYEOF
          > langs.txt

      - name: Update README
        run: |
          REP=$(grep ^repos= stats.txt|cut -d= -f2)
          STA=$(grep ^stars= stats.txt|cut -d= -f2)
          LNG=$(cat langs.txt)
          sed -i "s/placeholder_repos/$REP/" README.md
          sed -i "s/placeholder_stars/$STA/" README.md
          sed -i "s/placeholder_lang/$LNG/" README.md

      - name: Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update stats" || true
          git push --force
